<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <script type="text/javascript">
      (function() {
        var pathname = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        // Redirigir a index.html manteniendo la ruta original
        if (pathname !== '/' && !pathname.startsWith('/JoaquinBurgos1.github.io/')) {
          var redirectTo = window.location.protocol + '//' + window.location.host + '/JoaquinBurgos1.github.io/index.html' + pathname + search + hash;
          window.location.replace(redirectTo);
        }
      })();
    </script>
  </head>
  <body>
    <h1>404 - Not Found</h1>
  </body>
</html>
